<!DOCTYPE html>
<html>
<head>
    <title>Admin Kirish</title>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #34495e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Panelga kirish</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="Parolni kiriting" required autofocus>
            <button type="submit">KIRISH</button>
        </form>
    </div>
</body>
</html>
